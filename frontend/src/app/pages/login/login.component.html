<div class="container">
  <div class="login-card card">
    <div class="login-header">
      <i class="bi bi-dribbble" style="font-size: 2.5rem;"></i>
      <h4 class="mt-2 mb-0">Futebol Financeiro</h4>
      <p class="mb-0 opacity-75" style="font-size:0.85rem;">Acesso restrito</p>
    </div>
    <div class="card-body p-4">
      <div class="alert alert-danger" *ngIf="error">
        <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
      </div>

      <form (ngSubmit)="login()">
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuário</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" [(ngModel)]="username" name="username"
                   placeholder="Digite seu usuário" required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Senha</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" [(ngModel)]="password" name="password"
                   placeholder="Digite sua senha" required>
          </div>
        </div>
        <button type="submit" class="btn btn-verde w-100" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          <i *ngIf="!loading" class="bi bi-box-arrow-in-right me-2"></i>
          {{ loading ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>

      <div class="text-center mt-3">
        <a routerLink="/dashboard" class="text-muted" style="font-size:0.85rem;">
          <i class="bi bi-arrow-left me-1"></i>Voltar ao Dashboard
        </a>
      </div>
    </div>
  </div>
</div>
